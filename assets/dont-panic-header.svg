<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 340" width="440" height="340">
  <defs>
    <filter id="neonText" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="glow"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="sharp"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="sharp"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonThumb" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark panel for neon contrast -->
  <rect x="4" y="4" width="432" height="332" rx="16" fill="#0a0a1a"/>


  <!-- DON'T pixel text (top, centered) — neon magenta with glow -->
  <!-- D(30)+12+O(36)+12+N(30)+8+'(7)+8+T(30) = 173. Center in 440: x=133 -->
  <g fill="#ff0033" filter="url(#neonText)" transform="translate(133,10)">
    <!-- D -->
    <rect x="0" y="0" width="6" height="42"/>
    <rect x="6" y="0" width="12" height="6"/>
    <rect x="18" y="6" width="6" height="6"/>
    <rect x="24" y="12" width="6" height="18"/>
    <rect x="18" y="30" width="6" height="6"/>
    <rect x="6" y="36" width="12" height="6"/>

    <!-- O (+42) — round with inset corners -->
    <rect x="54" y="0" width="12" height="6"/>
    <rect x="48" y="6" width="6" height="6"/>
    <rect x="66" y="6" width="6" height="6"/>
    <rect x="42" y="12" width="6" height="18"/>
    <rect x="72" y="12" width="6" height="18"/>
    <rect x="48" y="30" width="6" height="6"/>
    <rect x="66" y="30" width="6" height="6"/>
    <rect x="54" y="36" width="12" height="6"/>

    <!-- N (+84) -->
    <rect x="84" y="0" width="6" height="42"/>
    <rect x="90" y="6" width="6" height="6"/>
    <rect x="96" y="12" width="6" height="6"/>
    <rect x="102" y="18" width="6" height="6"/>
    <rect x="108" y="0" width="6" height="42"/>

    <!-- ' (+122) -->
    <rect x="124" y="0" width="5" height="6"/>
    <rect x="122" y="6" width="5" height="6"/>

    <!-- T (+133) -->
    <rect x="133" y="0" width="30" height="6"/>
    <rect x="145" y="6" width="6" height="36"/>
  </g>

