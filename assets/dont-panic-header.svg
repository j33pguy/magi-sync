  <!-- PANIC pixel text (bottom, centered) — neon magenta with glow -->
  <!-- P(30)+12+A(30)+12+N(30)+12+I(18)+12+C(30) = 186. Center in 440: x=127 -->
  <g fill="#ff0033" filter="url(#neonText)" transform="translate(127,280)">
    <!-- P -->
    <rect x="0" y="0" width="6" height="42"/>
    <rect x="6" y="0" width="18" height="6"/>
    <rect x="24" y="6" width="6" height="12"/>
    <rect x="6" y="18" width="18" height="6"/>

    <!-- A (+42) -->
    <rect x="48" y="0" width="18" height="6"/>
    <rect x="42" y="6" width="6" height="36"/>
    <rect x="66" y="6" width="6" height="36"/>
    <rect x="48" y="18" width="18" height="6"/>

    <!-- N (+84) -->
    <rect x="84" y="0" width="6" height="42"/>
    <rect x="90" y="6" width="6" height="6"/>
    <rect x="96" y="12" width="6" height="6"/>
    <rect x="102" y="18" width="6" height="6"/>
    <rect x="108" y="0" width="6" height="42"/>

    <!-- I (+126) -->
    <rect x="126" y="0" width="18" height="6"/>
    <rect x="132" y="6" width="6" height="30"/>
    <rect x="126" y="36" width="18" height="6"/>

    <!-- C (+156) -->
    <rect x="162" y="0" width="24" height="6"/>
    <rect x="156" y="6" width="6" height="30"/>
    <rect x="162" y="36" width="24" height="6"/>
  </g>
</svg>
