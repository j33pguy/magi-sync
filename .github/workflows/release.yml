name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -count=1 -race

      - name: Build all platforms
        run: |
          mkdir -p dist
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=""
              if [ "$os" = "windows" ]; then
                ext=".exe"
                # Skip windows/arm64 for now
                if [ "$arch" = "arm64" ]; then continue; fi
              fi
              echo "Building magi-sync $os/$arch..."
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
                go build -trimpath -ldflags="-s -w" \
                -o "dist/magi-sync-${os}-${arch}${ext}" ./cmd/magi-sync/
              echo "Building mcp-config $os/$arch..."
              CGO_ENABLED=0 GOOS=$os GOARCH=$arch \
                go build -trimpath -ldflags="-s -w" \
                -o "dist/mcp-config-${os}-${arch}${ext}" ./cmd/mcp-config/
            done
          done
          cd dist && sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
